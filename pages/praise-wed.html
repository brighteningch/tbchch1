<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>수요찬양 · 빛나는교회</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><rect width=%22100%22 height=%22100%22 rx=%2220%22 fill=%22%230f3b64%22/><text x=%2250%22 y=%2268%22 font-size=%2255%22 text-anchor=%22middle%22 fill=%22white%22>%E2%9C%A6</text></svg>">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.css">
<link rel="stylesheet" href="/style.css">
</head>
<body>
<div id="headerHost"></div>

<section class="page-hero">
  <span class="page-badge">PRAISE · WEDNESDAY</span>
  <h1>수요찬양</h1>
  <p>빛나는교회 수요찬양 영상입니다.</p>
  <div class="bar"></div>
</section>

<div class="page-body">
  <p style="text-align:center;color:var(--text-gray);margin-bottom:24px;">찬양별 재생목록 구분은 준비 중입니다 — 우선 전체 채널 영상이 표시됩니다.</p>
  <div class="video-wrap">
    <iframe id="sermon-iframe-page" src="" title="빛나는교회 설교 영상" frameborder="0"
      allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture"
      allowfullscreen loading="lazy"></iframe>
  </div>
  <div style="text-align:center;margin-top:24px;">
    <a id="sermon-channel-link-page" href="#" target="_blank" rel="noopener" class="btn btn-primary">유튜브 채널에서 더보기</a>
  </div>
</div>

<div id="footerHost"></div>
<script src="https://identity.netlify.com/v1/netlify-identity-widget.js"></script>
<script src="/common.js"></script>
<script>
document.addEventListener('sitedata:loaded', (e) => {
  const data = e.detail;
  document.getElementById('sermon-iframe-page').src = `https://www.youtube.com/embed/videoseries?list=${data.sermon.youtube_playlist_id}`;
  document.getElementById('sermon-channel-link-page').href = data.sermon.youtube_channel_url;
});
</script>
</body>
</html>
