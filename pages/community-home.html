  <h3 style="color:var(--navy);margin-bottom:12px;">가정교회 (Home / House Church Community)</h3>
  <p>가. 하나님께서 영혼구원과 구속사의 완성을 위해 가정과 교회를 창조하셨습니다.</p>
  <p>나. 초대교회 뿐 아니라 거의 모든 교회가 가정교회 형태로 시작했습니다.</p>
  <p>다. 가정을 중심으로 교회를 이루고 교회의 역할 — 예배, 교제, 선교 — 을 감당함으로 역동적인 선교를 감당합니다.</p>
  <p>라. 가정교회들이 서로 연합(Network)을 이루어 건강한 지역교회를 세웁니다.</p>
