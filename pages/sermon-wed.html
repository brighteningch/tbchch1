<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>수요설교 · 빛나는교회</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><rect width=%22100%22 height=%22100%22 rx=%2220%22 fill=%22%230f3b64%22/><text x=%2250%22 y=%2268%22 font-size=%2255%22 text-anchor=%22middle%22 fill=%22white%22>%E2%9C%A6</text></svg>">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.css">
<link rel="stylesheet" href="/style.css">
</head>
<body>
<div id="headerHost"></div>

<section class="page-hero">
  <span class="page-badge">SERMON · WEDNESDAY</span>
  <h1>수요설교</h1>
  <p>빛나는교회 수요예배 설교 말씀입니다.</p>
  <div class="bar"></div>
</section>

<div class="page-body" style="max-width:980px;">
  <div class="sermon-table-wrap">
    <table class="sermon-table">
      <thead>
        <tr><th>번호</th><th>제목</th><th>본문</th><th>설교자</th><th>날짜</th><th>보기</th></tr>
      </thead>
      <tbody id="sermon-tbody" data-category="sermon-wed"></tbody>
    </table>
  </div>
  <p class="sermon-empty" id="sermon-empty" hidden>아직 등록된 말씀이 없습니다.</p>
</div>

<div id="footerHost"></div>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
<script src="/supabase-config.js"></script>
<script src="/member-auth.js"></script>
<script src="/common.js"></script>
<script>
function escHtml(s) { return (s || '').toString().replace(/&/g,'&amp;').replace(/</g,'&lt;'); }
fetch('/content/sermons.json')
  .then(res => res.json())
  .then(data => {
    const tbody = document.getElementById('sermon-tbody');
    const category = tbody.dataset.category;
    const items = (data.sermons || [])
      .filter(s => s.category === category)
      .sort((a, b) => new Date(b.date) - new Date(a.date));
    if (items.length === 0) {
      document.getElementById('sermon-empty').hidden = false;
      return;
    }
    tbody.innerHTML = items.map((s, i) => {
      const link = `/pages/sermon-view.html?category=${encodeURIComponent(category)}&date=${encodeURIComponent(s.date || '')}&title=${encodeURIComponent(s.title || '')}`;
      return `
      <tr>
        <td>${items.length - i}</td>
        <td class="sermon-title"><a href="${link}">${escHtml(s.title)}</a></td>
        <td>${escHtml(s.scripture || '')}</td>
        <td>${escHtml(s.speaker || '')}</td>
        <td>${(s.date || '').slice(0, 10)}</td>
        <td>${s.video_url ? `<a href="${link}" class="sermon-watch" aria-label="영상보기">▶</a>` : ''}</td>
      </tr>`;
    }).join('');
  })
  .catch(() => {
    document.getElementById('sermon-empty').hidden = false;
  });
</script>
</body>
</html>
