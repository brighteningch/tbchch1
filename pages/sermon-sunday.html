<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>주일설교 · 빛나는교회</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><rect width=%22100%22 height=%22100%22 rx=%2220%22 fill=%22%230f3b64%22/><text x=%2250%22 y=%2268%22 font-size=%2255%22 text-anchor=%22middle%22 fill=%22white%22>%E2%9C%A6</text></svg>">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.css">
<link rel="stylesheet" href="/style.css">
</head>
<body>
<div id="headerHost"></div>

<section class="page-hero">
  <span class="page-badge">SERMON · SUNDAY</span>
  <h1>주일설교</h1>
  <p>빛나는교회 주일 공동체 대예배 설교 말씀을 전해드립니다.</p>
  <div class="bar"></div>
</section>

<div class="page-body" style="max-width:1100px;">
  <div class="sermon-layout">
    <aside class="sermon-sidebar">
    <div class="sermon-sidebar-title">설교와 찬양</div>
    <div class="sermon-sidebar-group-title">말씀</div>
    <div class="sermon-sidebar-links">
      <a href="/pages/sermon-sunday.html" class="active">주일설교</a>
      <a href="/pages/sermon-wed.html">수요설교</a>
      <a href="/pages/sermon-fri.html">금요설교</a>
    </div>
    <div class="sermon-sidebar-group-title">찬양</div>
    <div class="sermon-sidebar-links">
      <a href="/pages/praise-wed.html">수요찬양</a>
      <a href="/pages/praise-fri.html">금요찬양</a>
    </div>
  </aside>
    <div class="sermon-main">
      <div class="community-board-header" style="margin-top:0;">
        <div></div>
        <a href="/pages/admin-sermons.html" class="btn btn-primary btn-sm" id="sermonWriteBtn" hidden>글쓰기</a>
      </div>
      <div class="sermon-table-wrap">
        <table class="sermon-table">
          <thead>
            <tr><th>번호</th><th>제목</th><th>본문</th><th>설교자</th><th>날짜</th><th>보기</th></tr>
          </thead>
          <tbody id="sermon-tbody" data-category="sermon-sunday"></tbody>
        </table>
      </div>
      <div id="sermon-pagination"></div>
      <p class="sermon-empty" id="sermon-empty" hidden>아직 등록된 말씀이 없습니다.</p>
    </div>
  </div>
</div>

<div id="footerHost"></div>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
<script src="/supabase-config.js"></script>
<script src="/member-auth.js"></script>
<script src="/common.js"></script>
<script src="/sermons-data.js"></script>
<script>
function escHtml(s) { return (s || '').toString().replace(/&/g,'&amp;').replace(/</g,'&lt;'); }
const SERMON_PER_PAGE = 15;
(async function () {
  const tbody = document.getElementById('sermon-tbody');
  const paginationEl = document.getElementById('sermon-pagination');
  const category = tbody.dataset.category;
  let items = [];

  function renderRows(page) {
    const start = (page - 1) * SERMON_PER_PAGE;
    const pageItems = items.slice(start, start + SERMON_PER_PAGE);
    tbody.innerHTML = pageItems.map((s, i) => {
      const link = `/pages/sermon-view.html?id=${encodeURIComponent(s.id)}`;
      const num = items.length - (start + i);
      return `
      <tr>
        <td>${num}</td>
        <td class="sermon-title"><a href="${link}">${escHtml(s.title)}</a></td>
        <td>${escHtml(s.scripture || '')}</td>
        <td>${escHtml(s.speaker || '')}</td>
        <td>${(s.date || '').slice(0, 10)}</td>
        <td>${s.video_url ? `<a href="${link}" class="sermon-watch" aria-label="영상보기">▶</a>` : ''}</td>
      </tr>`;
    }).join('');
    renderPagination(paginationEl, items.length, SERMON_PER_PAGE, page, renderRows);
  }

  try {
    const profile = await getCurrentProfile();
    if (profile && profile.is_admin) {
      const writeBtn = document.getElementById('sermonWriteBtn');
      writeBtn.hidden = false;
      writeBtn.href = `/pages/admin-sermons.html?category=${encodeURIComponent(category)}`;
    }
    items = await fetchSermons(category);
    if (items.length === 0) {
      document.getElementById('sermon-empty').hidden = false;
      return;
    }
    renderRows(1);
  } catch (err) {
    document.getElementById('sermon-empty').hidden = false;
  }
})();
</script>
</body>
</html>
