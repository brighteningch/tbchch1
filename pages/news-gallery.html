<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>갤러리(교회활동) · 빛나는교회</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><rect width=%22100%22 height=%22100%22 rx=%2220%22 fill=%22%230f3b64%22/><text x=%2250%22 y=%2268%22 font-size=%2255%22 text-anchor=%22middle%22 fill=%22white%22>%E2%9C%A6</text></svg>">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.css">
<link rel="stylesheet" href="/style.css">
</head>
<body>
<div id="headerHost"></div>

<section class="page-hero">
  <span class="page-badge">CHURCH NEWS</span>
  <h1>갤러리(교회활동)</h1>
  <p>빛나는교회 활동 사진·자료입니다.</p>
  <div class="bar"></div>
</section>

<div class="page-body" style="max-width:900px;">
  <div id="gallery-featured-page"></div>
  <div class="gallery-cat-grid" id="gallery-cat-grid-page"></div>
</div>

<div id="footerHost"></div>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
<script src="/supabase-config.js"></script>
<script src="/member-auth.js"></script>
<script src="/common.js"></script>
<script>
function formatDate(iso) { return iso ? iso.slice(0, 10) : ''; }
fetch('/.netlify/functions/drive-photos')
  .then(res => res.json())
  .then(data => {
    const featuredEl = document.getElementById('gallery-featured-page');
    const catGridEl = document.getElementById('gallery-cat-grid-page');
    if (data.error || !data.featured) {
      featuredEl.innerHTML = '<p class="gallery-empty">아직 사진이 없거나 불러오지 못했습니다.</p>';
      return;
    }
    const f = data.featured;
    featuredEl.innerHTML = `
      <div class="gallery-featured-card">
        <div class="gallery-featured-img">
          <span class="gallery-featured-badge">NEW FEATURED PHOTO</span>
          <img src="${f.thumb}" alt="${f.name}" loading="lazy">
        </div>
        <div class="gallery-featured-info">
          <p class="gallery-featured-cat">${f.category}</p>
          <p class="gallery-featured-title">${f.event}</p>
          <p class="gallery-featured-date">${formatDate(f.createdTime)} 업데이트</p>
          <a href="${f.link}" target="_blank" rel="noopener" class="btn btn-primary btn-sm" style="width:fit-content;">앨범 사진첩 전체보기 →</a>
        </div>
      </div>`;
    catGridEl.innerHTML = (data.categories || []).map(c => `
      <a href="${c.photo.link}" target="_blank" rel="noopener" class="gallery-cat-card">
        <div class="gallery-cat-thumb"><img src="${c.photo.thumb}" alt="${c.name}" loading="lazy"></div>
        <div>
          <p class="gallery-cat-label">행사 사진첩</p>
          <p class="gallery-cat-name">${c.name}</p>
          <p class="gallery-cat-date">최근 업데이트 · ${formatDate(c.photo.createdTime)}</p>
        </div>
      </a>`).join('');
  })
  .catch(() => {
    document.getElementById('gallery-featured-page').innerHTML = '<p class="gallery-empty">아직 사진이 없거나 불러오지 못했습니다.</p>';
  });
</script>
</body>
</html>
