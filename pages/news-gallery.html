<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>갤러리(교회활동) · 빛나는교회</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><rect width=%22100%22 height=%22100%22 rx=%2220%22 fill=%22%230f3b64%22/><text x=%2250%22 y=%2268%22 font-size=%2255%22 text-anchor=%22middle%22 fill=%22white%22>%E2%9C%A6</text></svg>">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.css">
<link rel="stylesheet" href="/style.css">
</head>
<body>
<div id="headerHost"></div>

<section class="page-hero">
  <span class="page-badge">CHURCH NEWS</span>
  <h1>갤러리(교회활동)</h1>
  <p>빛나는교회 활동 사진·자료입니다.</p>
  <div class="bar"></div>
</section>

<div class="page-body">
  <ul class="gallery-list" id="gallery-list-page"></ul>
</div>

<div id="footerHost"></div>
<script src="https://identity.netlify.com/v1/netlify-identity-widget.js"></script>
<script src="/common.js"></script>
<script>
document.addEventListener('sitedata:loaded', (e) => {
  const data = e.detail;
  const list = document.getElementById('gallery-list-page');
  list.innerHTML = '';
  if (data.gallery && data.gallery.length > 0) {
    data.gallery.forEach(item => {
      const li = document.createElement('li');
      li.innerHTML = `<a href="${item.drive_url}" target="_blank" rel="noopener">📁 ${item.title}</a>`;
      list.appendChild(li);
    });
  } else {
    list.innerHTML = '<li class="gallery-empty">등록된 자료가 아직 없습니다.</li>';
  }
});
</script>
</body>
</html>
