backend:
  name: git-gateway
  branch: main

media_folder: "admin/uploads"
public_folder: "/admin/uploads"

locale: "ko"

collections:
  - name: "site"
    label: "사이트 기본 설정"
    files:
      - name: "site"
        label: "전체 내용 편집"
        file: "content/site.json"
        fields:
          - label: "메인화면"
            name: "hero"
            widget: object
            fields:
              - { label: "작은 제목", name: "pretitle", widget: string }
              - { label: "강조 단어 (노란색)", name: "pretitle_accent", widget: string }
              - { label: "표어 첫줄", name: "verse_line1", widget: string }
              - { label: "표어 둘째줄", name: "verse_line2", widget: string }
              - { label: "성경구절 출처", name: "reference", widget: string }
              - label: "메인 배경 사진 (15초마다 자동 전환, 16:9 비율 권장)"
                name: "images"
                widget: list
                required: false
                fields:
                  - { label: "사진", name: "image", widget: image }

          - label: "교회소개"
            name: "about"
            widget: object
            fields:
              - { label: "정식 교단/교회명", name: "lead", widget: string }
              - { label: "인사말 본문", name: "message", widget: text, hint: "문단을 나누려면 빈 줄을 한 줄 띄워주세요" }
              - { label: "강조 문구", name: "highlight", widget: string }
              - { label: "서명", name: "signature", widget: string }

          - label: "예배안내"
            name: "worship"
            widget: list
            fields:
              - { label: "예배 이름", name: "name", widget: string }
              - { label: "시간", name: "time", widget: string }

          - label: "설교 영상"
            name: "sermon"
            widget: object
            fields:
              - { label: "유튜브 채널 주소", name: "youtube_channel_url", widget: string }
              - { label: "유튜브 업로드 재생목록 ID (채널ID UC를 UU로 바꾸면 됩니다)", name: "youtube_playlist_id", widget: string }

          - label: "헌금안내"
            name: "offering"
            widget: object
            fields:
              - { label: "계좌 정보", name: "bank_info", widget: string }
              - { label: "예금주", name: "holder", widget: string }
              - { label: "안내 문구", name: "note", widget: string }

          - label: "매일 묵상 말씀 (팝업에 매일 하나씩 자동으로 바뀌어 표시됩니다)"
            name: "daily_verses"
            widget: list
            hint: "성경 문구는 정확한 번역본(개역개정 권장)을 그대로 옮겨 적어주세요"
            fields:
              - { label: "말씀 본문", name: "text", widget: text }
              - { label: "출처 (예: 요한복음 3장 16절)", name: "reference", widget: string }

          - label: "갤러리 (구글드라이브 링크)"
            name: "gallery"
            widget: list
            required: false
            fields:
              - { label: "제목", name: "title", widget: string }
              - { label: "구글드라이브 링크", name: "drive_url", widget: string }

          - label: "교회 기본정보"
            name: "contact"
            widget: object
            fields:
              - { label: "교회 정식 명칭", name: "church_name", widget: string }
              - { label: "담임목사 성함", name: "pastor", widget: string }
              - { label: "전화번호", name: "phone", widget: string }
              - { label: "팩스번호", name: "fax", widget: string }
              - { label: "이메일", name: "email", widget: string }
              - { label: "주소", name: "address", widget: string }
              - { label: "버스 안내", name: "bus", widget: string }
              - { label: "인스타그램 주소 (없으면 비워두면 메뉴에서 숨겨집니다)", name: "instagram_url", widget: string, required: false }

          - label: "핵심가치"
            name: "core_values"
            widget: list
            required: false
            fields:
              - { label: "제목", name: "title", widget: string }
              - { label: "설명", name: "description", widget: text }

  - name: "notices"
    label: "공지사항"
    files:
      - name: "notices"
        label: "공지사항 목록 (새 글쓰기는 여기서 목록에 추가)"
        file: "content/notices.json"
        fields:
          - label: "공지 목록"
            name: "notices"
            widget: list
            fields:
              - { label: "날짜", name: "date", widget: datetime, format: "YYYY-MM-DD", date_format: "YYYY-MM-DD", time_format: false }
              - { label: "제목", name: "title", widget: string }
              - { label: "본문 (선택)", name: "body", widget: text, required: false }

  - name: "bulletins"
    label: "주보"
    files:
      - name: "bulletins"
        label: "주보 목록 (파일 업로드로 새 주보 추가)"
        file: "content/bulletins.json"
        fields:
          - label: "주보 목록"
            name: "bulletins"
            widget: list
            fields:
              - { label: "날짜", name: "date", widget: datetime, format: "YYYY-MM-DD", date_format: "YYYY-MM-DD", time_format: false }
              - { label: "제목", name: "title", widget: string, default: "주일 주보" }
              - { label: "주보 파일 (PDF 또는 이미지)", name: "file", widget: file }

  - name: "sermons"
    label: "말씀과 찬양"
    files:
      - name: "sermons"
        label: "말씀·찬양 목록 (새 글쓰기는 여기서 목록에 추가)"
        file: "content/sermons.json"
        fields:
          - label: "목록"
            name: "sermons"
            widget: list
            fields:
              - label: "분류"
                name: "category"
                widget: select
                options:
                  - { label: "주일설교", value: "sermon-sunday" }
                  - { label: "수요설교", value: "sermon-wed" }
                  - { label: "금요설교", value: "sermon-fri" }
                  - { label: "수요찬양", value: "praise-wed" }
                  - { label: "금요찬양", value: "praise-fri" }
              - { label: "날짜", name: "date", widget: datetime, format: "YYYY-MM-DD", date_format: "YYYY-MM-DD", time_format: false }
              - { label: "제목", name: "title", widget: string }
              - { label: "본문 (성경 구절)", name: "scripture", widget: string, required: false }
              - { label: "설교자 / 인도자", name: "speaker", widget: string, required: false }
              - { label: "영상 링크주소 (유튜브 등)", name: "video_url", widget: string, required: false }
              - { label: "상세 내용 (순서, 설명 등)", name: "body", widget: text, required: false }
